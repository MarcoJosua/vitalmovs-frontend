<div class="container mt-4" style="max-width: 500px;">
  <h2>Editar Fisioterapeuta</h2>

  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" class="form-control" [(ngModel)]="fisioterapeuta.nombre">
  </div>

  <div class="mb-3">
    <label class="form-label">Apellido</label>
    <input type="text" class="form-control" [(ngModel)]="fisioterapeuta.apellido">
  </div>

  <div class="mb-3">
    <label class="form-label">Especialidad</label>
    <input type="text" class="form-control" [(ngModel)]="fisioterapeuta.especialidad">
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" (click)="guardar()">Guardar cambios</button>
    <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
  </div>
</div>

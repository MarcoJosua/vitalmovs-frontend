<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">Editar Fisioterapeuta</h2>

    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-input" [(ngModel)]="fisioterapeuta.nombre">
    </div>

    <div class="form-group">
      <label class="form-label">Apellido</label>
      <input type="text" class="form-input" [(ngModel)]="fisioterapeuta.apellido">
    </div>

    <div class="form-group">
      <label class="form-label">Especialidad</label>
      <input type="text" class="form-input" [(ngModel)]="fisioterapeuta.especialidad">
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" (click)="guardar()">Guardar cambios</button>
      <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</div>

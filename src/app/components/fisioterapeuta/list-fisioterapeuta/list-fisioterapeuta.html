<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Fisioterapeutas</h2>
    <div>
      <a routerLink="/fisioterapeutas/buscar" class="btn btn-outline-secondary me-2">Buscar</a>
      <a routerLink="/fisioterapeutas/nuevo" class="btn btn-primary">+ Nuevo</a>
    </div>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Especialidad</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let f of fisioterapeutas">
        <td>{{ f.id }}</td>
        <td>{{ f.nombre }}</td>
        <td>{{ f.apellido }}</td>
        <td>{{ f.especialidad }}</td>
        <td>
          <button class="btn btn-sm btn-info me-1" (click)="verDiscapacidades(f.id!)">
            Discapacidades
          </button>
          <button class="btn btn-sm btn-warning me-1" (click)="editar(f.id!)">
            Editar
          </button>
          <button class="btn btn-sm btn-danger" (click)="eliminar(f.id!)">
            Eliminar
          </button>
        </td>
      </tr>
      <tr *ngIf="fisioterapeutas.length === 0">
        <td colspan="5" class="text-center text-muted">No hay fisioterapeutas registrados.</td>
      </tr>
    </tbody>
  </table>
</div>

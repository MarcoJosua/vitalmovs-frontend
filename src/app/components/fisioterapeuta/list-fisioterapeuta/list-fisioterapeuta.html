<div class="page-wrapper">

  <div class="header-row">
    <h2 class="page-title">Fisioterapeutas</h2>
  </div>

  <div class="search-row">
    <mat-icon class="search-icon">search</mat-icon>
    <input
      class="search-input"
      type="text"
      placeholder="Buscar por nombre o apellido..."
      [(ngModel)]="textoBusqueda"
      (input)="buscar()"
    />
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Especialidad</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let f of fisioterapeutasFiltrados">
        <td>{{ f.id }}</td>
        <td>{{ f.nombre }}</td>
        <td>{{ f.apellido }}</td>
        <td>{{ f.especialidad }}</td>
        <td>
          <button class="btn-discapacidad" (click)="verDiscapacidades(f.id!)">
            Ver discapacidades
          </button>
        </td>
      </tr>
      <tr *ngIf="fisioterapeutasFiltrados.length === 0">
        <td colspan="5" class="empty-row">No hay fisioterapeutas registrados.</td>
      </tr>
    </tbody>
  </table>

</div>

<div class="page-wrapper">
  <div class="card-header-row">
    <h2 class="page-title">Fisioterapeutas</h2>
    <div class="header-actions">
      <a routerLink="/fisioterapeutas/buscar" class="btn btn-outline">Buscar</a>
      <a routerLink="/fisioterapeutas/nuevo" class="btn btn-primary">+ Nuevo</a>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Especialidad</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of fisioterapeutas">
          <td>{{ f.id }}</td>
          <td>{{ f.nombre }}</td>
          <td>{{ f.apellido }}</td>
          <td><span class="badge">{{ f.especialidad }}</span></td>
          <td class="actions-cell">
            <button class="btn-action btn-info" (click)="verDiscapacidades(f.id!)">Discapacidades</button>
            <button class="btn-action btn-warning" (click)="editar(f.id!)">Editar</button>
            <button class="btn-action btn-danger" (click)="eliminar(f.id!)">Eliminar</button>
          </td>
        </tr>
        <tr *ngIf="fisioterapeutas.length === 0">
          <td colspan="5" class="empty-row">No hay fisioterapeutas registrados.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

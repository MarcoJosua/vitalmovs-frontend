<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">Nuevo fisioterapeuta</h2>

    <p class="form-subtitle" *ngIf="modoRegistro">
      Completa tus datos profesionales para finalizar el registro.
    </p>

    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input
        type="text"
        class="form-input"
        [(ngModel)]="fisioterapeuta.nombre"
        placeholder="Ingresa el nombre">
    </div>

    <div class="form-group">
      <label class="form-label">Apellido</label>
      <input
        type="text"
        class="form-input"
        [(ngModel)]="fisioterapeuta.apellido"
        placeholder="Ingresa el apellido">
    </div>

    <div class="form-group">
      <label class="form-label">Especialidad</label>
        <select class="form-input" [(ngModel)]="fisioterapeuta.especialidad">
          <option value="">Selecciona una especialidad</option>
          <option *ngFor="let especialidad of especialidades" [value]="especialidad">
            {{ especialidad }}
          </option>
        </select>
    </div>

    <div class="form-group" *ngIf="!modoRegistro">
      <label class="form-label">ID de usuario</label>
      <input
        type="number"
        class="form-input"
        [(ngModel)]="fisioterapeuta.userId"
        placeholder="Ingresa el ID del usuario">
    </div>

    <p class="info-text" *ngIf="modoRegistro">
      El fisioterapeuta quedará vinculado automáticamente al usuario creado.
    </p>

    <div class="form-actions">
      <button class="btn btn-primary" type="button" (click)="guardar()">
        Guardar
      </button>

      <button class="btn btn-secondary" type="button" (click)="cancelar()">
        Cancelar
      </button>
    </div>
  </div>
</div>

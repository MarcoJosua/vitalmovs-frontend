<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">Nuevo Fisioterapeuta</h2>

    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-input" [(ngModel)]="fisioterapeuta.nombre" placeholder="Ingresa el nombre">
    </div>

    <div class="form-group">
      <label class="form-label">Apellido</label>
      <input type="text" class="form-input" [(ngModel)]="fisioterapeuta.apellido" placeholder="Ingresa el apellido">
    </div>

    <div class="form-group">
      <label class="form-label">Especialidad</label>
      <input type="text" class="form-input" [(ngModel)]="fisioterapeuta.especialidad" placeholder="Ej: Neurológica, Deportiva...">
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
      <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</div>

<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">{{ editando ? 'Editar Foro' : 'Nuevo Foro' }}</h2>

    <div class="form-group">
      <label class="form-label">Titulo</label>
      <input type="text" class="form-input" [(ngModel)]="foro.titulo" placeholder="Titulo del foro">
    </div>

    <div class="form-group">
      <label class="form-label">Descripcion</label>
      <textarea class="form-input form-textarea" [(ngModel)]="foro.descripcion" placeholder="Descripcion del foro"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Tipo de discapacidad</label>
      <select class="form-input" [(ngModel)]="foro.tipoDiscapacidadId">
        <option [value]="0" disabled>Selecciona un tipo</option>
        <option *ngFor="let t of tipos" [value]="t.id">{{ t.nombre }}</option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
      <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</div>

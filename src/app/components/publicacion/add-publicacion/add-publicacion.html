<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">{{ editando ? 'Editar Publicacion' : 'Nueva Publicacion' }}</h2>

    <div class="form-group">
      <label class="form-label">Titulo</label>
      <input type="text" class="form-input" [(ngModel)]="publicacion.titulo" placeholder="Titulo de la publicacion">
    </div>

    <div class="form-group">
      <label class="form-label">Contenido</label>
      <textarea class="form-input form-textarea" [(ngModel)]="publicacion.contenido" placeholder="Escribe tu publicacion..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" (click)="guardar()">Guardar</button>
      <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</div>

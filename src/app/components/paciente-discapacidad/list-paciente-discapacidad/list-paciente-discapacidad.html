<div class="contenedor">
  <div class="encabezado">
    <h2>Discapacidades asignadas</h2>
    <button mat-raised-button color="primary" (click)="agregar()">
      <mat-icon>add</mat-icon> Agregar
    </button>
  </div>

  <table mat-table [dataSource]="filas" class="mat-elevation-z2">
    <ng-container matColumnDef="nombreTipo">
      <th mat-header-cell *matHeaderCellDef> Tipo de discapacidad </th>
      <td mat-cell *matCellDef="let fila"> {{ fila.nombreTipo }} </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let fila">
        <button mat-icon-button color="warn" (click)="quitar(fila.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
</div>

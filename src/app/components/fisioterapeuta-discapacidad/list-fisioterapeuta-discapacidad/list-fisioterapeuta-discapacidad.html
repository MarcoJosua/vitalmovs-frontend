<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Discapacidades del Fisioterapeuta #{{ fisioterapeutaId }}</h2>
    <div>
      <button class="btn btn-outline-secondary me-2" (click)="volver()">← Volver</button>
      <button class="btn btn-primary" (click)="agregar()">+ Agregar</button>
    </div>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>ID Tipo Discapacidad</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let d of discapacidades">
        <td>{{ d.id }}</td>
        <td>{{ d.tipoDiscapacidadId }}</td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="eliminar(d.id!)">Eliminar</button>
        </td>
      </tr>
      <tr *ngIf="discapacidades.length === 0">
        <td colspan="3" class="text-center text-muted">Sin discapacidades asignadas.</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="page-wrapper">
  <div class="form-card">
    <h2 class="form-title">Agregar Discapacidad — Fisioterapeuta #{{ fisioterapeutaId }}</h2>

    <div class="form-group">
      <label class="form-label">Tipo de Discapacidad</label>
      <select class="form-select" [(ngModel)]="tipoSeleccionadoId">
        <option [value]="0" disabled>Selecciona un tipo...</option>
        <option *ngFor="let t of tiposDiscapacidad" [value]="t.id">
          {{ t.nombre }}
        </option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" (click)="guardar()" [disabled]="!tipoSeleccionadoId">
        Guardar
      </button>
      <button class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</div>

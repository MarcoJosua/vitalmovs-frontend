<div class="page-wrapper">
  <div class="card-header-row">
    <h2 class="page-title">Discapacidades — Fisioterapeuta #{{ fisioterapeutaId }}</h2>
    <div class="header-actions">
      <button class="btn btn-outline" (click)="volver()">← Volver</button>
      <button class="btn btn-primary" (click)="agregar()">+ Agregar</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID Registro</th>
          <th>ID Tipo Discapacidad</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of discapacidades">
          <td>{{ d.id }}</td>
          <td>{{ d.tipoDiscapacidadId }}</td>
          <td>
            <button class="btn-action btn-danger" (click)="eliminar(d.id!)">Eliminar</button>
          </td>
        </tr>
        <tr *ngIf="discapacidades.length === 0">
          <td colspan="3" class="empty-row">Sin discapacidades asignadas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

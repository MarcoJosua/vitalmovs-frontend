<div class="page-wrapper">
  <div class="form-card">

    <h2 class="form-title">
      {{ id ? 'Editar paciente' : 'Nuevo paciente' }}
    </h2>

    <p class="form-subtitle" *ngIf="modoRegistro">
      Completa tus datos personales para finalizar el registro.
    </p>

    <form [formGroup]="form" (ngSubmit)="guardar()">

      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input
          type="text"
          class="form-input"
          formControlName="nombre"
          placeholder="Ingresa tu nombre">
      </div>

      <div class="form-group">
        <label class="form-label">Apellido</label>
        <input
          type="text"
          class="form-input"
          formControlName="apellido"
          placeholder="Ingresa tu apellido">
      </div>

      <div class="form-group">
        <label class="form-label">Edad</label>
        <input
          type="number"
          class="form-input"
          formControlName="edad"
          placeholder="Ingresa tu edad">
      </div>

      <div class="form-group">
        <label class="form-label">Sexo</label>
        <select class="form-input" formControlName="sexo">
          <option value="">Selecciona una opción</option>
          <option value="Masculino">Masculino</option>
          <option value="Femenino">Femenino</option>
        </select>
      </div>

      <div class="form-group" *ngIf="!modoRegistro">
        <label class="form-label">ID de usuario</label>
        <input
          type="number"
          class="form-input"
          formControlName="userId"
          placeholder="Ingresa el ID del usuario">
      </div>

      <p class="info-text" *ngIf="modoRegistro">
        El paciente quedará vinculado automáticamente al usuario creado.
      </p>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit">
          Guardar
        </button>

        <button class="btn btn-secondary" type="button" (click)="cancelar()">
          Cancelar
        </button>
      </div>

    </form>
  </div>
</div>

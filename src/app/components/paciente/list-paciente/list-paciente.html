<div class="page-wrapper">

  <div class="header-row">
    <h2 class="page-title">Pacientes</h2>
  </div>

  <div class="search-row">
    <mat-icon class="search-icon">search</mat-icon>

    <input
      class="search-input"
      type="text"
      placeholder="Buscar por nombre..."
      (input)="buscar($event)">
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Edad</th>
        <th>Sexo</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let paciente of pacientes">
        <td>{{ paciente.id }}</td>
        <td>{{ paciente.nombre }}</td>
        <td>{{ paciente.apellido }}</td>
        <td>{{ paciente.edad }}</td>
        <td>{{ paciente.sexo }}</td>
        <td>
          <button
            class="btn btn-info"
            type="button"
            (click)="verDiscapacidades(paciente.id!)">
            Ver discapacidades
          </button>
        </td>
      </tr>

      <tr *ngIf="pacientes.length === 0">
        <td colspan="6" class="empty-row">
          No hay pacientes registrados.
        </td>
      </tr>
    </tbody>
  </table>

</div>

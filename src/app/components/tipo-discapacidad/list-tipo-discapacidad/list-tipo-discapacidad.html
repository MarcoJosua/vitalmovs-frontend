<div class="page-wrapper">

  <div class="header-row">
    <h2 class="page-title">Tipos de discapacidad</h2>

    <button
      class="btn btn-primary"
      type="button"
      (click)="nuevo()">
      + Nuevo tipo
    </button>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let tipo of tipos">
        <td>{{ tipo.id }}</td>
        <td>{{ tipo.nombre }}</td>
        <td>{{ tipo.descripcion }}</td>
        <td>
          <button
            class="btn btn-edit"
            type="button"
            (click)="editar(tipo.id!)">
            Editar
          </button>
          <button
            class="btn btn-danger"
            type="button"
            (click)="eliminar(tipo.id!)">
            Eliminar
          </button>
        </td>
      </tr>

      <tr *ngIf="tipos.length === 0">
        <td colspan="4" class="empty-row">
          No hay tipos de discapacidad registrados.
        </td>
      </tr>
    </tbody>
  </table>

</div>
